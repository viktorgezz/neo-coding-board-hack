services:
  postgres:
    image: postgres:16-alpine
    container_name: neo_postgres
    environment:
      POSTGRES_DB: neo_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neo_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  analytics-service:
    container_name: neo_analytics_service
    build:
      context: ./AnaliticsService
      dockerfile: Dockerfile
    env_file:
      - ./AnaliticsService/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

