map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Браузерный WebSocket не шлёт Authorization; STOMP передаёт JWT в ?access_token=…
map $arg_access_token $java_ws_authorization {
    ""      $http_authorization;
    default "Bearer $arg_access_token";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Для app оставляем resolver + переменную (имя резолвится при запросе).
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # После пересборки Vite меняет хэши в /assets/*.js; если index.html закэширован,
    # браузер запрашивает старые чанки → "Failed to fetch dynamically imported module".
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Старый бандл после docker pull: GET /api/v1/admin/users → реальный staff в Java.
    location = /api/v1/admin/users {
        set $upstream_core app:8080;
        proxy_pass http://$upstream_core/api/v1/users/staff$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/ {
        set $upstream_core app:8080;
        proxy_pass http://$upstream_core$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /ws {
        set $upstream_core app:8080;
        proxy_pass http://$upstream_core$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header Authorization $java_ws_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Префиксы срезаем rewrite + proxy_pass на переменную: иначе nginx кэширует IP
    # контейнеров при старте, после recreate compose получается connection refused (502).

    location /tasks-api/ {
        set $upstream_tasks http://tasks-bank-service:8000;
        rewrite ^/tasks-api/(.*)$ /$1 break;
        proxy_pass $upstream_tasks;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /analytics-api/ {
        set $upstream_analytics http://analytics-service:8000;
        rewrite ^/analytics-api/(.*)$ /$1 break;
        proxy_pass $upstream_analytics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /cursor-ws/ {
        set $upstream_cursor http://ws-cursor-service:8000;
        rewrite ^/cursor-ws/(.*)$ /$1 break;
        proxy_pass $upstream_cursor;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /code-ws/ {
        set $upstream_code http://ws-code-service:8000;
        rewrite ^/code-ws/(.*)$ /$1 break;
        proxy_pass $upstream_code;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
