spring:
  application:
    name: core-service
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true

security:
  jwt:
    employees:
      access-expiration-ms: 900000
      refresh-expiration-ms: 172800000
    users:
      access-expiration-ms: 900000
      refresh-expiration-ms: 7200000
  origin:
    frontend: ${FRONTEND_ORIGIN:http://localhost:5173}

logging:
  level:
    ru.viktorgezz.business_service: DEBUG
    ru.viktorgezz.security: DEBUG

app:
  integration:
    history:
      base-url: ${HISTORY_SERVICE_URL:http://analytics-service:8000}
      endpoint: "/api/v1/rooms/{idRoom}/history"